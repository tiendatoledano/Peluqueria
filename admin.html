<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Estilo y Belleza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --color-primary: #c5a47e; --color-dark: #1a1a1a; }
        body { font-family: 'Poppins', sans-serif; background: #f8f9fa; }
        .admin-header { background: var(--color-dark); color: white; padding: 20px 0; margin-bottom: 30px; }
        .card { border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 10px; margin-bottom: 20px; }
        .btn-primary-custom { background: var(--color-primary); color: white; border: none; padding: 10px 20px; border-radius: 30px; }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="loginOverlay" style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
        <div class="bg-white p-5 rounded" style="width:350px; text-align:center;">
            <h4 class="mb-4">🔐 Acceso Administrativo</h4>
            <input type="password" class="form-control mb-3" id="adminPassword" placeholder="Contraseña">
            <button class="btn btn-primary-custom w-100" id="loginBtn">Ingresar</button>
            <p class="text-danger mt-2" id="loginError" style="display:none;">Contraseña incorrecta</p>
            <a href="/" class="btn btn-link mt-2">← Volver al sitio</a>
        </div>
    </div>

    <!-- Panel Admin -->
    <div id="adminPanel" style="display:none;">
        <div class="admin-header">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center">
                    <h4>Panel de Administración - Estilo y Belleza</h4>
                    <div>
                        <button class="btn btn-light btn-sm" id="logoutBtn">Cerrar sesión</button>
                        <a href="/" class="btn btn-light btn-sm">← Sitio público</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="container">
            <ul class="nav nav-tabs mb-4">
                <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#carouselTab">Gestionar Carrusel</a></li>
                <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#appointmentsTab">Turnos Solicitados</a></li>
            </ul>
            <div class="tab-content">
                <div class="tab-pane fade show active" id="carouselTab">
                    <div class="card"><div class="card-body">
                        <h5>Agregar imagen al carrusel</h5>
                        <form id="carouselForm">
                            <div class="row">
                                <div class="col-md-6 mb-3"><label>URL de la imagen</label><input type="text" class="form-control" id="carouselImage" required></div>
                                <div class="col-md-6 mb-3"><label>Nombre del peinado</label><input type="text" class="form-control" id="carouselName" required></div>
                                <div class="col-12 mb-3"><label>Descripción (opcional)</label><textarea class="form-control" id="carouselDescription" rows="2"></textarea></div>
                            </div>
                            <button type="submit" class="btn btn-primary-custom">Agregar</button>
                        </form>
                    </div></div>
                    <h5>Imágenes actuales</h5>
                    <div class="row" id="carouselPreview"></div>
                </div>
                <div class="tab-pane fade" id="appointmentsTab">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead><tr><th>Nombre</th><th>Teléfono</th><th>Servicio</th><th>Precio</th><th>Fecha</th><th>Hora</th><th>Modalidad</th><th>Total</th><th>Acciones</th></tr></thead>
                            <tbody id="appointmentsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = window.location.origin;
        const ADMIN_PASS = 'admin123';
        let isLoggedIn = false;

        document.getElementById('loginBtn').addEventListener('click', () => {
            const pass = document.getElementById('adminPassword').value;
            if (pass === ADMIN_PASS) {
                isLoggedIn = true;
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadCarouselAdmin();
                loadAppointments();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            isLoggedIn = false;
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('loginOverlay').style.display = 'flex';
        });

        document.getElementById('carouselForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const image = document.getElementById('carouselImage').value;
            const name = document.getElementById('carouselName').value;
            const description = document.getElementById('carouselDescription').value;
            
            await fetch(`${API_URL}/api/carousel`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image, name, description })
            });
            
            this.reset();
            loadCarouselAdmin();
        });

        async function loadCarouselAdmin() {
            const res = await fetch(`${API_URL}/api/carousel`);
            const images = await res.json();
            document.getElementById('carouselPreview').innerHTML = images.map((img, i) => `
                <div class="col-md-3 mb-3">
                    <div class="card"><img src="${img.image}" class="card-img-top" style="height:150px;object-fit:cover">
                        <div class="card-body p-2"><small><strong>${img.name}</strong></small>
                            <button class="btn btn-danger btn-sm w-100 mt-2" onclick="deleteCarousel(${i})">Eliminar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function deleteCarousel(index) {
            await fetch(`${API_URL}/api/carousel/${index}`, { method: 'DELETE' });
            loadCarouselAdmin();
        }

        async function loadAppointments() {
            const res = await fetch(`${API_URL}/api/appointments`);
            const apps = await res.json();
            document.getElementById('appointmentsTable').innerHTML = apps.length === 0 
                ? '<tr><td colspan="9" class="text-center">No hay turnos</td></tr>'
                : apps.map((app, i) => `
                    <tr>
                        <td>${app.name}</td>
                        <td>${app.phone}</td>
                        <td>${app.service}</td>
                        <td>$ ${app.price}</td>
                        <td>${app.date}</td>
                        <td>${app.time}</td>
                        <td>${app.delivery === 'domicilio' ? '🏠 Domicilio' : '📍 Local'}</td>
                        <td><strong>$ ${app.total}</strong></td>
                        <td>
                            <button class="btn btn-success btn-sm" onclick="contactWhatsApp('${app.phone}', '${app.name}', '${app.service}', '${app.date}', '${app.time}')"><i class="fab fa-whatsapp"></i></button>
                            <button class="btn btn-danger btn-sm" onclick="deleteAppointment(${i})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
        }

        async function deleteAppointment(index) {
            if (confirm('¿Eliminar este turno?')) {
                await fetch(`${API_URL}/api/appointments/${index}`, { method: 'DELETE' });
                loadAppointments();
            }
        }

        function contactWhatsApp(phone, name, service, date, time) {
            const cleanPhone = phone.replace(/\D/g, '');
            const msg = `Hola ${name}, tu turno en Estilo y Belleza ha sido confirmado exitosamente.%0A%0A*Servicio:* ${service}%0A*Fecha:* ${date}%0A*Hora:* ${time}%0A%0A¡Te esperamos! 💇‍♀️✨`;
            window.open(`https://wa.me/${cleanPhone}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
